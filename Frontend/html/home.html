<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes</title>
    <link rel="stylesheet" href="/static/styles/style.css">
    <link rel="stylesheet" href="/static/styles/home.css">
</head>
<body>
<div class="layout">

    <aside class="sidebar">
        <img src="/static/imagenes/logo.png" class="sidebar-logo" alt="Echoes">
        <nav>
            <a href="/static/html/home.html" class="active"> Home</a>
            <a href="/static/html/browse.html"> Browse</a>
            <a href="/static/html/wishlist.html"> Wishlist</a>
            <a href="/static/html/profile.html"> Profile</a>
        </nav>
        <div class="sidebar-bottom" id="sidebar-user"></div>
    </aside>

    <main class="main-content">

        <div class="topbar">
            <input type="text" id="search" placeholder="Search games…" oninput="debounceSearch()" />
        </div>

        <div id="search-results" style="display:none; margin-bottom:28px;">
            <div class="section-title">Search Results</div>
            <div class="games-grid" id="search-grid"></div>
        </div>

        <section class="hero" id="hero">
            <div class="hero-info">
                <p class="hero-label">Featured</p>
                <h2 id="hero-title">Loading…</h2>
                <p id="hero-desc" class="hero-desc"></p>
                <div class="hero-actions">
                    <button class="btn btn-primary" id="hero-wishlist">❤️ Wishlist</button>
                    <button class="btn btn-ghost" id="hero-like">👍 Like</button>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">Recommended For You</div>
            <div class="games-grid" id="recommended"></div>
        </section>

        <br>

            <div id="genre-sections"></div>

        <br>

        <section>
            <div class="section-title">Similar Users Also Played</div>
            <div class="games-grid" id="similarUsers"></div>
        </section>

    </main>
</div>

<script src="/static/scripts/shared.js"></script>
<script src="/static/scripts/home.js"></script>
</body>
</html>
